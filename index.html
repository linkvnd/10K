<!DOCTYPE html>
<html lang="vi">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #8b5cf6;
            --primary-blue: #3b82f6;
            --dark-bg: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary-purple), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--primary-purple);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            white-space: nowrap;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary-blue);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
        }

        .highlight-score {
            color: #10b981; /* Green for high scores */
            font-weight: bold;
        }
        
        .total-col {
            font-weight: bold;
            color: #fbbf24;
            background: rgba(255, 255, 255, 0.02);
        }

        .footer {
            margin-top: 3rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .footer span {
            background: linear-gradient(135deg, var(--primary-purple), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary-purple); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-blue); }
    </style>
</head>

        // Tính tổng điểm cho từng học sinh
        studentData.forEach(student => {
            student.total = (student.toan + student.d1 + student.d2).toFixed(2);
        });

        // Mặc định sắp xếp tổng điểm từ cao xuống thấp
        studentData.sort((a, b) => b.total - a.total);

        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');

        function renderTable(data) {
            tableBody.innerHTML = '';
            data.forEach(student => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${student.stt}</td>
                    <td style="text-align: left; font-weight: 600;">${student.name}</td>
                    <td>${student.dob}</td>
                    <td>${student.sbd}</td>
                    <td>${student.room}</td>
                    <td style="color: var(--primary-purple);">${student.ca1}</td>
                    <td style="color: var(--primary-blue);">${student.ca2}</td>
                    <td>${student.toan}</td>
                    <td class="${student.d1 >= 8 ? 'highlight-score' : ''}">${student.d1}</td>
                    <td class="${student.d2 >= 8 ? 'highlight-score' : ''}">${student.d2}</td>
                    <td class="total-col">${student.total}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // Khởi tạo bảng lần đầu
        renderTable(studentData);

        // Chức năng tìm kiếm real-time
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = studentData.filter(student => 
                student.name.toLowerCase().includes(searchTerm) || 
                student.sbd.includes(searchTerm)
            );
            renderTable(filteredData);
        });
    </script>
